# ── Server ───────────────────────────────────────────────
server.port=8080

# ── Database (MySQL – switch to H2 for dev/testing) ──────
# H2 in-memory (uncomment for quick local dev without MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/fwma?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── JPA ──────────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────
app.jwt.secret=fwms_super_secret_key_change_this_in_production_must_be_256_bits_long
app.jwt.expiration=86400000

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,https://your-frontend.vercel.app

# ── App ──────────────────────────────────────────────────
app.name=FWMS
spring.application.name=fwms-backend
